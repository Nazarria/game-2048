<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 Game</title>
    <link rel="stylesheet" type="text/css" rel="noopener" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital@0;1&display=swap"
      rel="stylesheet" />
    <script src="./index.js"></script>
  </head>
  <body>
    <main>
      <div class="header">
        <div class="title">2048</div>
        <span class="sore">
          <div>Score</div>
          <div id="scoreValue">0</div>
        </span>
        <button type="button" onClick="window.location.reload();">
          New Game
        </button>
      </div>

      <div id="board" class="unselectable">
        <div id="00" class="cell"></div>
        <div id="01" class="cell"></div>
        <div id="02" class="cell"></div>
        <div id="03" class="cell"></div>

        <div id="10" class="cell"></div>
        <div id="11" class="cell"></div>
        <div id="12" class="cell"></div>
        <div id="13" class="cell"></div>

        <div id="20" class="cell"></div>
        <div id="21" class="cell"></div>
        <div id="22" class="cell"></div>
        <div id="23" class="cell"></div>

        <div id="30" class="cell"></div>
        <div id="31" class="cell"></div>
        <div id="32" class="cell"></div>
        <div id="33" class="cell"></div>

        <div id="tile-container"></div>
      </div>

      <dialog id="gameEndDialog" class="unselectable">
        <p>Game Over!</p>
        <button id="closeButton">Try Again</button>
      </dialog>
    </main>
    <script>
      const SIZE = 4
      const ANIM_DURATION = 100 // ms — matches CSS transition duration

      const eventMap = {
        ArrowLeft: API.left,
        ArrowRight: API.right,
        ArrowUp: API.up,
        ArrowDown: API.down,
      }

      window.state = {
        position: API.init(SIZE),
        score: 0,
      }

      const dialog = document.querySelector('dialog')
      const scoreValue = document.getElementById('scoreValue')
      const tileContainer = document.getElementById('tile-container')

      function changeOpacity(value) {
        dialog.style.opacity = value
      }

      function showDialogTransition() {
        dialog.showModal()
        changeOpacity('1')
      }

      const closeButton = document.querySelector('dialog button')

      closeButton.addEventListener('click', () => {
        dialog.close()
        changeOpacity('0')
      })

      // Compute pixel position for a grid cell within tile-container
      function getCellPos(row, col) {
        const w = tileContainer.offsetWidth
        const gap = 12
        const cellSize = (w - 3 * gap) / 4
        return {
          left: col * (cellSize + gap),
          top: row * (cellSize + gap),
          size: cellSize,
        }
      }

      // Create an absolutely-positioned ghost tile
      function createGhostTile(value, row, col) {
        const pos = getCellPos(row, col)
        const el = document.createElement('div')
        el.className = 'ghost-tile'
        el.textContent = value
        el.setAttribute('data-value', value)
        el.style.width = pos.size + 'px'
        el.style.height = pos.size + 'px'
        el.style.transform = 'translate(' + pos.left + 'px,' + pos.top + 'px)'
        return el
      }

      function clearGhostTiles() {
        tileContainer.innerHTML = ''
      }

      // Strip animation classes
      function clearAnimations() {
        for (let i = 0; i < SIZE; i++) {
          for (let j = 0; j < SIZE; j++) {
            const el = document.getElementById(i.toString() + j.toString())
            el.className = 'cell'
            el.style.visibility = ''
          }
        }
      }

      // Pending animation timeout handle — cleared on each new move
      let animTimer = null

      function render(state, oldPosition, moveInfo) {
        // Cancel any pending animation completion from previous move
        if (animTimer) {
          clearTimeout(animTimer)
          animTimer = null
        }

        clearAnimations()
        clearGhostTiles()

        // Update all grid cells to their final values
        for (let i = 0; i < SIZE; i++) {
          for (let j = 0; j < SIZE; j++) {
            const el = document.getElementById(i.toString() + j.toString())
            const val = state.position[i][j]
            el.textContent = val === 0 ? '' : val
            el.setAttribute('data-value', val)
          }
        }

        // Initial render — no animation needed
        if (!oldPosition || !moveInfo) return

        const ghosts = []
        const hiddenCells = []
        const mergeCells = []

        for (let i = 0; i < SIZE; i++) {
          for (let j = 0; j < SIZE; j++) {
            const info = moveInfo[i][j]
            const val = state.position[i][j]
            const oldVal = oldPosition ? oldPosition[i][j] : 0
            const el = document.getElementById(i.toString() + j.toString())

            if (info) {
              const hasMoved = info.dx !== 0 || info.dy !== 0

              if (hasMoved || info.merged) {
                // Hide destination cell — ghosts will cover it during animation
                el.style.visibility = 'hidden'
                hiddenCells.push(el)

                if (info.merged) {
                  mergeCells.push(el)
                }

                // Ghost for primary tile: slides from source to destination
                const displayValue = info.merged ? val / 2 : val
                const sourceRow = i + info.dy
                const sourceCol = j + info.dx
                const ghost = createGhostTile(displayValue, sourceRow, sourceCol)
                tileContainer.appendChild(ghost)
                ghosts.push({ el: ghost, destRow: i, destCol: j })

                // Ghost for secondary merge tile
                if (info.merged) {
                  const sourceRow2 = i + info.mdy
                  const sourceCol2 = j + info.mdx
                  const ghost2 = createGhostTile(displayValue, sourceRow2, sourceCol2)
                  tileContainer.appendChild(ghost2)
                  ghosts.push({ el: ghost2, destRow: i, destCol: j })
                }
              }
              // else: tile didn't move and didn't merge — stays visible in grid
            } else if (val !== 0 && val !== oldVal) {
              // New tile from addRandom — pop in after slide animation completes
              el.classList.add('anim-pop')
            }
          }
        }

        // Force reflow so ghosts render at source positions first
        void tileContainer.offsetHeight

        // Animate ghosts to their destinations
        for (const g of ghosts) {
          const destPos = getCellPos(g.destRow, g.destCol)
          g.el.style.transform = 'translate(' + destPos.left + 'px,' + destPos.top + 'px)'
        }

        // After slide transition completes: remove ghosts, reveal cells, trigger merge animation
        animTimer = setTimeout(() => {
          animTimer = null
          clearGhostTiles()

          for (const el of hiddenCells) {
            el.style.visibility = ''
          }
          // Force reflow before adding merge animation
          void document.getElementById('board').offsetHeight
          for (const el of mergeCells) {
            el.classList.add('anim-merge')
          }
        }, ANIM_DURATION)

        // Animate score
        const oldScore = parseInt(scoreValue.textContent) || 0
        scoreValue.textContent = state.score
        if (state.score > oldScore) {
          scoreValue.classList.remove('score-pop')
          void scoreValue.offsetHeight
          scoreValue.classList.add('score-pop')
        }
      }

      function checkEvent(xss, fn) {
        const [rs, _] = fn(xss)
        return !API.sameMatrixes(rs, xss)
      }

      function checkEndGame(eventKey, key1, key2, fn) {
        if (eventKey === key1 || eventKey === key2) {
          if (!checkEvent(window.state.position, fn)) {
            showDialogTransition()
          }
        }
      }

      function processMove(handler, eventKey) {
        if (handler) {
          const oldPosition = copyMatrix(window.state.position)
          const [newState, points, moveInfo] = handler(window.state.position)
          window.state.score += points
          const sameMatrixes = API.sameMatrixes(newState, window.state.position)

          if (emptyCoordinates(newState)?.length === 0 && sameMatrixes) {
            checkEndGame(eventKey, 'ArrowLeft', 'ArrowRight', API.up)
            checkEndGame(eventKey, 'ArrowUp', 'ArrowDown', API.right)
          } else if (!sameMatrixes) {
            const res = API.addRandom(newState)
            if (!res) {
              showDialogTransition()
            }
            window.state.position = res
          }

          render(window.state, oldPosition, moveInfo)
        }
      }

      // Touch events
      let startX, startY

      function handleTouchStart(e) {
        const touch = e.touches[0]
        startX = touch.clientX
        startY = touch.clientY
      }

      function handleTouchEnd(e) {
        const touch = e.changedTouches[0]
        const endX = touch.clientX
        const endY = touch.clientY
        const diffX = endX - startX
        const diffY = endY - startY
        const diffXAbs = Math.abs(diffX)
        const diffYAbs = Math.abs(diffY)

        let pair

        if (diffXAbs > 50 || diffYAbs > 50) {
          if (diffXAbs > diffYAbs) {
            pair =
              diffX > 0
                ? ['ArrowRight', eventMap.ArrowRight]
                : ['ArrowLeft', eventMap.ArrowLeft]
          } else {
            pair =
              diffY > 0
                ? ['ArrowDown', eventMap.ArrowDown]
                : ['ArrowUp', eventMap.ArrowUp]
          }

          const [eventKey, handler] = pair
          processMove(handler, eventKey)
        }
      }

      let target = document.getElementById('board')
      target.addEventListener('touchstart', handleTouchStart)
      target.addEventListener('touchend', handleTouchEnd)

      // Key up events
      document.addEventListener('keyup', event => {
        const handler = eventMap[event.key]
        processMove(handler, event.key)
      })

      render(window.state, null, null)
    </script>
  </body>
</html>
