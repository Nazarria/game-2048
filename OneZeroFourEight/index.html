<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 Game</title>
    <link rel="stylesheet" type="text/css" rel="noopener" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital@0;1&display=swap"
      rel="stylesheet" />
    <script src="./index.js"></script>
  </head>
  <body>
    <main>
      <div class="header">
        <div class="title">2048</div>
        <span class="sore">
          <div>Score</div>
          <div id="scoreValue">0</div>
        </span>
        <button type="button" onClick="window.location.reload();">
          New Game
        </button>
      </div>

      <div id="board" class="unselectable">
        <div id="00"></div>
        <div id="01"></div>
        <div id="02"></div>
        <div id="03"></div>

        <div id="10"></div>
        <div id="11"></div>
        <div id="12"></div>
        <div id="13"></div>

        <div id="20"></div>
        <div id="21"></div>
        <div id="22"></div>
        <div id="23"></div>

        <div id="30"></div>
        <div id="31"></div>
        <div id="32"></div>
        <div id="33"></div>
      </div>

      <dialog id="gameEndDialog" class="unselectable">
        <p>Game Over!</p>
        <button id="closeButton">Try Again</button>
      </dialog>
    </main>
    <script>
      const SIZE = 4

      const eventMap = {
        ArrowLeft: API.left,
        ArrowRight: API.right,
        ArrowUp: API.up,
        ArrowDown: API.down,
      }

      const directionMap = {
        ArrowLeft: 'left',
        ArrowRight: 'right',
        ArrowUp: 'up',
        ArrowDown: 'down',
      }

      window.state = {
        position: API.init(SIZE),
        score: 0,
      }

      const dialog = document.querySelector('dialog')
      const scoreValue = document.getElementById('scoreValue')

      function changeOpacity(value) {
        dialog.style.opacity = value
      }

      function showDialogTransition() {
        dialog.showModal()
        changeOpacity('1')
      }

      const closeButton = document.querySelector('dialog button')

      closeButton.addEventListener('click', () => {
        dialog.close()
        changeOpacity('0')
      })

      // Strip animation classes so they can be re-triggered
      function clearAnimations() {
        for (let i = 0; i < SIZE; i++) {
          for (let j = 0; j < SIZE; j++) {
            const el = document.getElementById(i.toString() + j.toString())
            el.className = ''
          }
        }
      }

      function render(state, oldPosition, direction) {
        // Clear previous animations first
        clearAnimations()

        // Force a reflow so re-adding the same animation class works
        void document.getElementById('board').offsetHeight

        for (let i = 0; i < SIZE; i++) {
          for (let j = 0; j < SIZE; j++) {
            const id = i.toString() + j.toString()
            const el = document.getElementById(id)
            const val = state.position[i][j]
            const oldVal = oldPosition ? oldPosition[i][j] : 0

            el.textContent = val === 0 ? '' : val
            el.setAttribute('data-value', val)

            // Determine animation
            if (oldPosition && direction) {
              if (oldVal === 0 && val !== 0) {
                // New tile appeared here
                el.classList.add('anim-pop')
              } else if (val !== 0 && oldVal !== 0 && val > oldVal) {
                // Merge happened — value increased
                el.classList.add('anim-merge')
              } else if (val !== 0 && val !== oldVal) {
                // Tile slid in from somewhere
                el.classList.add('anim-slide-' + direction)
              }
            }
          }
        }

        // Animate score
        const oldScore = parseInt(scoreValue.textContent) || 0
        scoreValue.textContent = state.score
        if (state.score > oldScore) {
          scoreValue.classList.remove('score-pop')
          void scoreValue.offsetHeight
          scoreValue.classList.add('score-pop')
        }
      }

      function checkEvent(xss, fn) {
        const [rs, _] = fn(xss)
        return !API.sameMatrixes(rs, xss)
      }

      function checkEndGame(eventKey, key1, key2, fn) {
        if (eventKey === key1 || eventKey === key2) {
          if (!checkEvent(window.state.position, fn)) {
            showDialogTransition()
          }
        }
      }

      function processMove(handler, eventKey) {
        if (handler) {
          const oldPosition = copyMatrix(window.state.position)
          const [newState, points] = handler(window.state.position)
          window.state.score += points
          const sameMatrixes = API.sameMatrixes(newState, window.state.position)
          const direction = directionMap[eventKey]

          if (emptyCoordinates(newState)?.length === 0 && sameMatrixes) {
            checkEndGame(eventKey, 'ArrowLeft', 'ArrowRight', API.up)
            checkEndGame(eventKey, 'ArrowUp', 'ArrowDown', API.right)
          } else if (!sameMatrixes) {
            const res = API.addRandom(newState)
            if (!res) {
              showDialogTransition()
            }
            window.state.position = res
          }

          render(window.state, oldPosition, direction)
        }
      }

      // Touch events
      let startX, startY

      function handleTouchStart(e) {
        const touch = e.touches[0]
        startX = touch.clientX
        startY = touch.clientY
      }

      function handleTouchEnd(e) {
        const touch = e.changedTouches[0]
        const endX = touch.clientX
        const endY = touch.clientY
        const diffX = endX - startX
        const diffY = endY - startY
        const diffXAbs = Math.abs(diffX)
        const diffYAbs = Math.abs(diffY)

        let pair

        if (diffXAbs > 50 || diffYAbs > 50) {
          if (diffXAbs > diffYAbs) {
            pair =
              diffX > 0
                ? ['ArrowRight', eventMap.ArrowRight]
                : ['ArrowLeft', eventMap.ArrowLeft]
          } else {
            pair =
              diffY > 0
                ? ['ArrowDown', eventMap.ArrowDown]
                : ['ArrowUp', eventMap.ArrowUp]
          }

          const [eventKey, handler] = pair
          processMove(handler, eventKey)
        }
      }

      let target = document.getElementById('board')
      target.addEventListener('touchstart', handleTouchStart)
      target.addEventListener('touchend', handleTouchEnd)

      // Key up events
      document.addEventListener('keyup', event => {
        const handler = eventMap[event.key]
        processMove(handler, event.key)
      })

      render(window.state, null, null)
    </script>
  </body>
</html>
